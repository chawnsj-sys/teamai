<script>
let smData = { tables: [] };
let smSelectedTable = null;

function showSemanticPage() {
  document.getElementById('semantic-page').style.display = 'flex';
  loadSemanticModel();
}
function hideSemanticPage() {
  document.getElementById('semantic-page').style.display = 'none';
}

async function loadSemanticModel() {
  const source = document.getElementById('sm-domain').value;
  const url = '/api/semantic-model' + (source ? '?source=' + source : '');
  try {
    const resp = await fetch(url);
    smData = await resp.json();
    renderTableList();
  } catch (e) { console.error('Load semantic model error:', e); }
}

function renderTableList() {
  const list = document.getElementById('sm-table-list');
  const search = (document.getElementById('sm-search').value || '').toLowerCase();
  let html = '';
  let lastSource = '';
  for (const t of smData.tables) {
    if (search && !t.name.toLowerCase().includes(search)) continue;
    if (t.source !== lastSource) {
      lastSource = t.source;
      const icon = t.source === 'snowflake' ? '❄️' : '☁️';
      const label = t.source === 'snowflake' ? 'Snowflake · 只读' : '数据湖';
      html += '<div style="padding:8px 14px 4px;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px">' + icon + ' ' + label + '</div>';
    }
    const isActive = smSelectedTable === t.name;
    const dotColor = (t.status === 'confirmed' || t.source === 'snowflake') ? '#22c55e' : '#d29922';
    const nameColor = isActive ? '#2563eb;font-weight:600' : (t.source === 'snowflake' ? '#999' : '#1a1a1a');
    const bg = isActive ? 'background:#eff6ff;border-left:2px solid #2563eb;padding-left:12px' : '';
    const dims = t.columns.filter(c => c.semantic_type === 'dimension' || c.type === 'dimension').length;
    const mets = t.columns.filter(c => c.semantic_type === 'measure' || c.type === 'measure').length;
    const meta = dims || mets ? dims + '维 ' + mets + '指' : t.columns.length + '列';
    html += '<div onclick="smSelectTable(\'' + t.name + '\')" style="display:flex;align-items:center;padding:7px 14px;cursor:pointer;gap:8px;' + bg + '" onmouseover="this.style.background=this.style.background||\'' + '#f5f5f5' + '\'" onmouseout="this.style.background=\'' + (isActive ? '#eff6ff' : '') + '\'">';
    html += '<span style="width:7px;height:7px;border-radius:50%;background:' + dotColor + ';flex-shrink:0"></span>';
    html += '<span style="flex:1;min-width:0"><div style="font-size:13px;color:' + nameColor + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + t.name + '</div>' + (t.description ? '<div style="font-size:10px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">' + t.description.substring(0,30) + '</div>' : '') + '</span>';
    html += '<span style="font-size:11px;color:#bbb;white-space:nowrap;flex-shrink:0">' + meta + '</span>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function smFilterTables() { renderTableList(); }

function smSelectTable(name) {
  smSelectedTable = name;
  renderTableList();
  const t = smData.tables.find(x => x.name === name);
  if (!t) return;

  document.getElementById('sm-table-title').textContent = t.name;
  const tag = document.getElementById('sm-table-tag');
  if (t.source === 'snowflake') { tag.textContent = '🔒 只读'; tag.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:12px;background:#f0f0f0;color:#999'; }
  else if (t.status === 'confirmed') { tag.textContent = '✓ 已确认'; tag.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:12px;background:#dcfce7;color:#166534'; }
  else { tag.textContent = '⚡ 自动生成'; tag.style.cssText = 'font-size:11px;padding:2px 8px;border-radius:12px;background:#fef3c7;color:#92400e'; }

  document.getElementById('sm-table-info').textContent = t.source + ' · ' + (t.database || '') + ' · ' + t.columns.length + '列 · ' + t.relationships.length + '关系';

  // Render action buttons based on source and status
  let btns = '';
  if (t.source !== 'snowflake') {
    btns += '<button onclick="smStartEdit()" id="sm-btn-edit" style="padding:4px 10px;border:1px solid #e0e0e0;border-radius:5px;cursor:pointer;font-size:11px;background:#fff;color:#666">✏️ 编辑</button> ';
    btns += '<button onclick="smRegenerate()" style="padding:4px 10px;border:1px solid #e0e0e0;border-radius:5px;cursor:pointer;font-size:11px;background:#fff;color:#666">🤖 重新生成</button> ';
    if (t.status !== 'confirmed') btns += '<button onclick="smConfirm()" style="padding:4px 10px;border:none;border-radius:5px;cursor:pointer;font-size:11px;background:#22c55e;color:#fff">✓ 确认</button>';
  }
  document.getElementById('sm-action-btns').innerHTML = btns;

  // Generate YAML
  let yaml = '# 语义模型 - ' + t.name + '\n';
  yaml += '# source: ' + t.source + (t.source === 'snowflake' ? ' (只读)' : '') + '\n\n';
  yaml += 'name: ' + t.name + '\n';
  yaml += 'description: ' + (t.description || '') + '\n';
  yaml += 'database: ' + (t.database || '') + '\n';
  yaml += 'source: ' + (t.source || '') + '\n';
  if (t.semantic_view) yaml += 'semantic_view: ' + t.semantic_view + '\n';
  if (t.domain) yaml += 'domain: ' + t.domain + '\n';

  const dims = t.columns.filter(c => c.type === 'dimension' || c.semantic_type === 'dimension');
  const measures = t.columns.filter(c => c.type === 'measure' || c.semantic_type === 'measure');
  const others = t.columns.filter(c => !dims.includes(c) && !measures.includes(c));

  if (dims.length) {
    yaml += '\ndimensions:\n';
    dims.forEach(c => {
      yaml += '  - name: ' + c.name + '\n';
      if (c.description) yaml += '    description: ' + c.description + '\n';
      if (c.business_name) yaml += '    business_name: ' + c.business_name + '\n';
      if (c.synonyms) yaml += '    synonyms: ' + c.synonyms + '\n';
    });
  }
  if (measures.length) {
    yaml += '\nmetrics:\n';
    measures.forEach(c => {
      yaml += '  - name: ' + c.name + '\n';
      if (c.description) yaml += '    description: ' + c.description + '\n';
      if (c.expression) yaml += '    expression: ' + c.expression + '\n';
      if (c.aggregation) yaml += '    default_aggregation: ' + c.aggregation + '\n';
    });
  }
  if (others.length) {
    yaml += '\ncolumns:\n';
    others.forEach(c => {
      yaml += '  - name: ' + c.name + ' (' + (c.type || '?') + ')\n';
      if (c.description) yaml += '    description: ' + c.description + '\n';
    });
  }
  if (t.relationships.length) {
    yaml += '\nrelationships:\n';
    t.relationships.forEach(r => {
      yaml += '  - to: ' + r.to_table + (r.to_source === 'snowflake' ? ' (Snowflake)' : '') + '\n';
      yaml += '    join_column: ' + (r.join_column || '?') + '\n';
    });
  }

  // Syntax highlight YAML
  function highlightYaml(t){return t.split('\n').map(function(l){if(l.indexOf('#')===0)return'<span style="color:#bbb">'+l+'</span>';var ci=l.indexOf(': ');if(ci>0){var k=l.substring(0,ci+1);var v=l.substring(ci+1);var vc=(v.trim().indexOf('[')===0||v.trim().indexOf('"')===0)?'#2563eb':(k.indexOf('description')>=0||k.indexOf('business_name')>=0)?'#166534':'#333';return'<span style="color:#92400e">'+k+'</span><span style="color:'+vc+'">'+v.replace(/</g,'&lt;')+'</span>';}if(l.trim().indexOf('- ')===0){var ind=(l.match(/^([ ]*)/)||[''])[0];return ind+'<span style="color:#92400e">- </span>'+l.substring(ind.length+2);}return l;}).join('\n');}
  document.getElementById('sm-yaml-content').innerHTML = highlightYaml(yaml);
  if (document.getElementById('sm-graph-view').style.display !== 'none') renderGraph();
}

function smSwitchView(view, btn) {
  document.querySelectorAll('.sm-view-btn').forEach(b => { b.style.background = '#fff'; b.style.color = '#999'; });
  btn.style.background = '#2563eb'; btn.style.color = '#fff';
  document.getElementById('sm-yaml-view').style.display = view === 'yaml' ? 'block' : 'none';
  document.getElementById('sm-graph-view').style.display = view === 'graph' ? 'block' : 'none';
  if (view === 'graph') renderGraph();
}

function renderGraph() {
  const t = smData.tables.find(x => x.name === smSelectedTable);
  if (!t) { document.getElementById('sm-graph-content').innerHTML = '<div style="color:#999;padding:40px;text-align:center">选择左侧的表查看图形化视图</div>'; return; }

  const dims = t.columns.filter(c => c.semantic_type === 'dimension' || c.type === 'dimension');
  const meas = t.columns.filter(c => c.semantic_type === 'measure' || c.type === 'measure');
  const others = t.columns.filter(c => !dims.includes(c) && !meas.includes(c));
  const showDims = dims, showMeas = meas, showOthers = others;
  const hiddenDims = 0, hiddenMeas = 0, hiddenOthers = 0;

  // Deduplicate relationships
  const relMap = {};
  (t.relationships || []).forEach(r => {
    if (!relMap[r.to_table]) relMap[r.to_table] = { cols: [], direction: r.direction || 'outgoing', source: r.to_source };
    if (r.join_column && !relMap[r.to_table].cols.includes(r.join_column)) relMap[r.to_table].cols.push(r.join_column);
  });
  const relKeys = Object.keys(relMap);
  const sameSource = relKeys.filter(k => relMap[k].source === t.source);
  const crossSource = relKeys.filter(k => relMap[k].source !== t.source);

  // Layout
  const mainW = 380;
  const rowH = 20;
  const headerH = 44;
  const sectionGapH = 24;
  let contentH = headerH + 12;
  if (showDims.length) contentH += 16 + showDims.length * rowH + (hiddenDims > 0 ? 16 : 0) + sectionGapH;
  if (showMeas.length) contentH += 16 + showMeas.length * rowH + (hiddenMeas > 0 ? 16 : 0) + sectionGapH;
  if (showOthers.length) contentH += 16 + showOthers.length * rowH + (hiddenOthers > 0 ? 16 : 0);
  const mainH = contentH + 16;

  const relW = 190, relH = 72, relGap = 28;
  const canvasW = document.getElementById('sm-graph-content').offsetWidth || 800;
  const maxRels = Math.max(sameSource.length, crossSource.length, 1);
  const canvasH = Math.max(mainH + 80, maxRels * (relH + relGap) + 80);
  const mainX = (canvasW - mainW) / 2, mainY = (canvasH - mainH) / 2;

  const borderColor = t.source === 'snowflake' ? '#d0d5dd' : '#2563eb';
  const headerBg = t.source === 'snowflake' ? '#f5f5f5' : '#eff6ff';

  let svg = '<svg width="100%" height="' + canvasH + '" viewBox="0 0 ' + canvasW + ' ' + canvasH + '" style="font-family:-apple-system,system-ui,sans-serif">';
  svg += '<defs><marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 1 L8 5 L0 9z" fill="#ccc"/></marker>';
  svg += '<marker id="ahc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 1 L8 5 L0 9z" fill="#d29922"/></marker></defs>';

  // Main card shadow
  svg += '<rect x="' + (mainX+2) + '" y="' + (mainY+2) + '" width="' + mainW + '" height="' + mainH + '" rx="10" fill="#00000008"/>';
  svg += '<rect x="' + mainX + '" y="' + mainY + '" width="' + mainW + '" height="' + mainH + '" rx="10" fill="#fff" stroke="' + borderColor + '" stroke-width="2"/>';
  svg += '<rect x="' + mainX + '" y="' + mainY + '" width="' + mainW + '" height="' + headerH + '" rx="10" fill="' + headerBg + '"/>';
  svg += '<rect x="' + mainX + '" y="' + (mainY + headerH - 10) + '" width="' + mainW + '" height="10" fill="' + headerBg + '"/>';
  svg += '<text x="' + (mainX + 16) + '" y="' + (mainY + 22) + '" font-size="14" font-weight="700" fill="#1a1a1a">' + (t.source === 'snowflake' ? '❄️ ' : '☁️ ') + t.name + '</text>';
  if (t.description) svg += '<text x="' + (mainX + 16) + '" y="' + (mainY + 36) + '" font-size="10" fill="#999">' + t.description.substring(0, 50) + '</text>';

  let cy = mainY + headerH + (t.description ? 28 : 16);

  function drawSection(items, hidden, label, icon, color) {
    if (!items.length) return;
    svg += '<text x="' + (mainX + 16) + '" y="' + cy + '" font-size="10" fill="#999" font-weight="600" letter-spacing="0.5">' + label + ' (' + (items.length + hidden) + ')</text>';
    cy += 18;
    items.forEach(c => {
      svg += '<text x="' + (mainX + 20) + '" y="' + cy + '" font-size="12">';
      svg += '<tspan fill="' + color + '">' + icon + '</tspan> ';
      svg += '<tspan fill="#333">' + c.name + '</tspan>';
      svg += '</text>';
      if (c.business_name) svg += '<text x="' + (mainX + mainW - 16) + '" y="' + cy + '" font-size="10" fill="#bbb" text-anchor="end">' + c.business_name + '</text>';
      cy += rowH;
    });
    if (hidden > 0) {
      svg += '<text x="' + (mainX + 20) + '" y="' + cy + '" font-size="12" fill="#999">... +' + hidden + ' more</text>';
      cy += 16;
    }
    cy += 8;
  }

  drawSection(showDims, hiddenDims, 'DIMENSIONS', '◆', '#2563eb');
  drawSection(showMeas, hiddenMeas, 'METRICS', '▲', '#22c55e');
  drawSection(showOthers, hiddenOthers, 'COLUMNS', '•', '#666');

  // Related table cards + lines
  function drawRelGroup(rels, side) {
    const totalH = rels.length * (relH + relGap) - relGap;
    const startY = mainY + (mainH - totalH) / 2;
    rels.forEach((toTable, i) => {
      const rt = smData.tables.find(x => x.name === toTable);
      if (!rt) return;
      const info = relMap[toTable];
      const isCross = info.source !== t.source;
      const rx = side === 'left' ? 24 : canvasW - relW - 24;
      const ry = startY + i * (relH + relGap);
      const rtBorder = isCross ? '#d29922' : '#34d399';
      const rtHeaderBg = isCross ? '#fef3c7' : '#f0fdf4';
      const rdims = rt.columns.filter(c => c.semantic_type === 'dimension' || c.type === 'dimension').length;
      const rmeas = rt.columns.filter(c => c.semantic_type === 'measure' || c.type === 'measure').length;

      // Card
      svg += '<g style="cursor:pointer" onclick="smSelectTable(\'' + toTable + '\')">';
      svg += '<rect x="' + rx + '" y="' + ry + '" width="' + relW + '" height="' + relH + '" rx="8" fill="#fff" stroke="' + rtBorder + '" stroke-width="1.5"/>';
      svg += '<rect x="' + rx + '" y="' + ry + '" width="' + relW + '" height="28" rx="8" fill="' + rtHeaderBg + '"/>';
      svg += '<rect x="' + rx + '" y="' + (ry + 20) + '" width="' + relW + '" height="8" fill="' + rtHeaderBg + '"/>';
      svg += '<text x="' + (rx + 10) + '" y="' + (ry + 19) + '" font-size="11.5" font-weight="600" fill="#1a1a1a">' + (rt.source === 'snowflake' ? '❄️ ' : '☁️ ') + rt.name + '</text>';
      svg += '<text x="' + (rx + 10) + '" y="' + (ry + 44) + '" font-size="10" fill="#999">' + (rdims ? rdims + ' 维度 ' : '') + (rmeas ? rmeas + ' 指标' : rt.columns.length + ' 列') + '</text>';
      if (rt.description) svg += '<text x="' + (rx + 10) + '" y="' + (ry + 58) + '" font-size="9" fill="#bbb">' + rt.description.substring(0, 16) + '</text>';
      if (isCross) svg += '<text x="' + (rx + relW - 10) + '" y="' + (ry + 46) + '" font-size="9" fill="#d29922" text-anchor="end">跨源</text>';
      // Hover tooltip
      svg += '<title>' + rt.name + '\n' + rt.columns.map(c => (c.semantic_type === 'dimension' ? '◆ ' : c.semantic_type === 'measure' ? '▲ ' : '• ') + c.name + (c.business_name ? ' (' + c.business_name + ')' : '')).join('\n') + '</title>';
      svg += '</g>';

      // Line with label offset to avoid overlap
      const joinCols = info.cols.slice(0, 2);
      const joinLabel = joinCols.join(', ') + (info.cols.length > 2 ? ' +' + (info.cols.length - 2) : '');
      const lineColor = isCross ? '#d29922' : '#ccc';
      const marker = isCross ? 'url(#ahc)' : 'url(#ah)';
      const dashArr = isCross ? '6,4' : '';
      let x1, y1, x2, y2;
      if (side === 'left') {
        x1 = rx + relW + 2; y1 = ry + relH / 2;
        x2 = mainX - 2; y2 = mainY + mainH * (0.3 + 0.4 * i / Math.max(rels.length - 1, 1));
      } else {
        x1 = mainX + mainW + 2; y1 = mainY + mainH * (0.2 + 0.6 * i / Math.max(rels.length - 1, 1));
        x2 = rx - 2; y2 = ry + relH / 2;
      }
      const midX = (x1 + x2) / 2;
      svg += '<path d="M' + x1 + ' ' + y1 + ' C' + midX + ' ' + y1 + ' ' + midX + ' ' + y2 + ' ' + x2 + ' ' + y2 + '" fill="none" stroke="' + lineColor + '" stroke-width="1.2" stroke-dasharray="' + dashArr + '" marker-end="' + marker + '"/>';
      // Label on line, offset vertically per index
      const labelX = midX;
      const labelY = (y1 + y2) / 2 - 5;
      svg += '<text x="' + labelX + '" y="' + labelY + '" font-size="9" fill="' + lineColor + '" text-anchor="middle" font-family="SF Mono,monospace">' + joinLabel + '</text>';
    });
  }

  if (sameSource.length) drawRelGroup(sameSource, 'left');
  if (crossSource.length) drawRelGroup(crossSource, 'right');

  // Legend
  svg += '<text x="24" y="' + (canvasH - 12) + '" font-size="12" fill="#999">';
  svg += '<tspan fill="#2563eb">◆</tspan> 维度  <tspan fill="#22c55e">▲</tspan> 指标  ';
  svg += '<tspan fill="#ccc">——</tspan> 同源  <tspan fill="#d29922">- - -</tspan> 跨源  ';
  svg += '(hover 关联表查看详情)</text>';
  svg += '</svg>';

  document.getElementById('sm-graph-content').innerHTML = svg;
}


let smEditMode = false;
let smOrigYaml = '';

function smStartEdit() {
  if (!smSelectedTable) return;
  const t = smData.tables.find(x => x.name === smSelectedTable);
  if (!t || t.source === 'snowflake') return;
  smEditMode = true;
  smOrigYaml = document.getElementById('sm-yaml-content').textContent || '';
  document.getElementById('sm-yaml-textarea').value = smOrigYaml;
  document.getElementById('sm-yaml-view').style.display = 'none';
  document.getElementById('sm-yaml-edit').style.display = 'block';
  // Switch buttons to save/cancel
  document.getElementById('sm-action-btns').innerHTML = '<button onclick="smSaveEdit()" style="padding:4px 10px;border:none;border-radius:5px;cursor:pointer;font-size:11px;background:#2563eb;color:#fff">💾 保存</button> <button onclick="smCancelEdit()" style="padding:4px 10px;border:1px solid #e0e0e0;border-radius:5px;cursor:pointer;font-size:11px;background:#fff;color:#666">✕ 取消</button>';
}

function smCancelEdit() {
  smEditMode = false;
  document.getElementById('sm-yaml-edit').style.display = 'none';
  document.getElementById('sm-yaml-view').style.display = 'block';
  // Restore buttons
  smSelectTable(smSelectedTable);
}

async function smSaveEdit() {
  if (!smSelectedTable) return;
  const yamlText = document.getElementById('sm-yaml-textarea').value;
  // Parse YAML to extract column updates
  const columns = [];
  let currentCol = null;
  yamlText.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (trimmed.startsWith('- name:')) {
      if (currentCol) columns.push(currentCol);
      currentCol = { name: trimmed.replace('- name:', '').trim().split(' ')[0] };
    } else if (currentCol && trimmed.startsWith('description:')) {
      currentCol.description = trimmed.replace('description:', '').trim();
    } else if (currentCol && trimmed.startsWith('business_name:')) {
      currentCol.business_name = trimmed.replace('business_name:', '').trim();
    } else if (currentCol && trimmed.startsWith('semantic_type:')) {
      currentCol.semantic_type = trimmed.replace('semantic_type:', '').trim();
    } else if (currentCol && trimmed.startsWith('expression:')) {
      currentCol.expression = trimmed.replace('expression:', '').trim();
    } else if (currentCol && trimmed.startsWith('default_aggregation:')) {
      currentCol.aggregation = trimmed.replace('default_aggregation:', '').trim();
    }
  });
  if (currentCol) columns.push(currentCol);

  try {
    const resp = await fetch('/api/semantic-model/' + smSelectedTable, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ columns: columns, status: 'confirmed' })
    });
    const result = await resp.json();
    if (result.ok) {
      smEditMode = false;
      document.getElementById('sm-yaml-edit').style.display = 'none';
      document.getElementById('sm-yaml-view').style.display = 'block';
      // Reload data
      await loadSemanticModel();
      smSelectTable(smSelectedTable);
      alert('✅ 已保存并标记为 confirmed');
    } else {
      alert('保存失败: ' + (result.error || ''));
    }
  } catch (e) {
    alert('保存失败: ' + e.message);
  }
}

async function smConfirm() {
  if (!smSelectedTable) return;
  try {
    const resp = await fetch('/api/semantic-model/' + smSelectedTable, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'confirmed' })
    });
    const result = await resp.json();
    if (result.ok) {
      await loadSemanticModel();
      smSelectTable(smSelectedTable);
      alert('✅ ' + smSelectedTable + ' 已确认');
    }
  } catch (e) { alert('确认失败: ' + e.message); }
}

async function smRegenerate() {
  if (!smSelectedTable) return;
  if (!confirm('重新生成将覆盖当前语义标注，确定？')) return;
  try {
    const resp = await fetch('/api/semantic-model/' + smSelectedTable + '/regenerate', { method: 'POST' });
    const result = await resp.json();
    alert('🤖 ' + (result.message || '已提交重新生成'));
  } catch (e) { alert('失败: ' + e.message); }
}

<script>
// SQL Confirm Flow
function sqlConfirmExec(btn){
  const bar=btn.closest('div[data-sql]');
  if(!bar)return;
  const sql=bar.dataset.sql;
  bar.innerHTML='<span style="font-size:11px;color:#2563eb">⏳ 执行中...</span>';
  // Send confirmation message to agent
  if(ws&&ws.readyState===1){
    ws.send(JSON.stringify({type:'chat',text:'确认执行以下 SQL：\n```sql\n'+sql+'\n```',channel:curCh}));
  }
}
function sqlConfirmEdit(btn){
  const bar=btn.closest('div[data-sql]');
  if(!bar)return;
  const sql=bar.dataset.sql;
  const pre=bar.previousElementSibling;
  // Replace code block with editable textarea
  const ta=document.createElement('textarea');
  ta.style.cssText='width:100%;min-height:80px;font-family:SF Mono,Monaco,monospace;font-size:12px;padding:10px;border:2px solid #2563eb;border-radius:6px;background:#f8f8f8;color:#333;resize:vertical;line-height:1.5';
  ta.value=sql;
  pre.style.display='none';
  pre.parentNode.insertBefore(ta,pre);
  // Change buttons
  bar.innerHTML='<span style="font-size:11px;color:#666;flex:1">✏️ 修改 SQL</span>'
    +'<button onclick="sqlConfirmCancel(this)" style="background:#fff;border:1px solid #e0e0e0;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;color:#666">取消</button>'
    +'<button onclick="sqlConfirmExecEdited(this)" style="background:#2563eb;color:#fff;border:none;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px">▶️ 执行修改后的 SQL</button>';
}
function sqlConfirmCancel(btn){
  const bar=btn.closest('div[data-sql]');
  if(!bar)return;
  const ta=bar.previousElementSibling;
  if(ta&&ta.tagName==='TEXTAREA'){
    const pre=ta.nextElementSibling;
    if(pre)pre.style.display='';
    ta.remove();
  }

    + '<div class="msg-nm" style="color:' + a.color + '">' + a.name + ' <span style="font-size:9px;color:#bbb;font-weight:normal">需求确认</span></div>'
    + '<div class="msg-tx">' + content + '</div>'
    + '</div>';
  $('chat').appendChild(d); scrollC();
}

function pmIntentConfirm() {
  _intentPmMode = false;
  _intentMode = false;
  var card = document.getElementById('intent-card');
  if (card) { card.style.opacity='0.5'; card.style.pointerEvents='none'; var bs=card.querySelectorAll('button'); for(var i=0;i<bs.length;i++) bs[i].style.display='none'; }

  // Collect confirmed SQLs for each expert
  var confirmedSqls = {};
  _intentItems.forEach(function(part) {
    if (part._source === 'datalake' && part.sql) {
      confirmedSqls['aws-expert'] = part.sql;
    } else if (part._source === 'snowflake' && part.sql) {
      confirmedSqls['snowflake-expert'] = part.sql;
    }
  });

  // Direct dispatch: send confirmed SQLs to experts via API, then PM summarizes
  var originalQ = _intentOriginal.replace(/@pm\s*/g, '').trim();
  _intentOriginal = '';
  _intentHistory = [];
  _intentItems = [];
  _intentSql = '';

  // Show user message in chat
  if (ws && ws.readyState === 1) {
    // Don't send to PM via WebSocket - API direct dispatch handles everything
    // ws.send(JSON.stringify({ type: 'chat', text: '@pm ' + originalQ, channel: curCh }));
  }
  addSys('🔄 正在分发给专家执行...');

  // Dispatch to experts in parallel via API
  var expertTasks = Object.entries(confirmedSqls);
  var results = [];
  var pending = expertTasks.length;

  expertTasks.forEach(function(entry) {
    var agentId = entry[0];
    var sql = entry[1];
    var taskMsg = '【需求已确认，请直接执行以下 SQL】\n原始提问：' + originalQ + '\n\n```sql\n' + sql + '\n```\n请执行这条 SQL 并分析结果。';

    fetch('/api/chat/' + agentId, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: taskMsg, timeout: 300000 })
    }).then(function(r) { return r.json(); }).then(function(data) {
      var agentName = agentId === 'aws-expert' ? 'Nova' : '凌';
      results.push({ agent: agentName, text: data.text || data.error || 'no response' });
      pending--;
      if (pending <= 0) pmSummarize(originalQ, results);
    }).catch(function(e) {
      results.push({ agent: agentId, text: 'error: ' + e.message });
      pending--;
      if (pending <= 0) pmSummarize(originalQ, results);
    });
  });

  function pmSummarize(question, expertResults) {
    // Remove loading message
    var sysMsgs = document.querySelectorAll('.sys');
    for (var i = sysMsgs.length - 1; i >= 0; i--) {
      if (sysMsgs[i].textContent.indexOf('正在分发') >= 0) { sysMsgs[i].remove(); break; }
    }

    // Send results to PM for summary
    var feedback = expertResults.map(function(r) { return '【' + r.agent + ' 的分析结果】\n' + r.text; }).join('\n\n---\n\n');
    var summaryMsg = '[团队反馈] 以下是团队成员的回复，请直接汇总成报告:\n\n' + feedback + '\n\n请综合以上结果，回答用户的问题：' + question;

    fetch('/api/chat/pm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: summaryMsg, timeout: 300000 })
    }).then(function(r) { return r.json(); }).then(function(data) {
      // Display PM summary in chat
      var pmAgent = (typeof agents !== 'undefined' && agents.find(function(a){return a.id==='pm';})) || { name: 'Alex', icon: '🎯', color: '#d97706' };
      var d = document.createElement('div');
      d.className = 'msg agent';
      d.innerHTML = '<div class="msg-av" style="background:' + pmAgent.color + '22;color:' + pmAgent.color + '">' + pmAgent.icon + '</div>'
        + '<div class="msg-body">'
        + '<div class="msg-nm" style="color:' + pmAgent.color + '">' + pmAgent.name + '</div>'
        + '<div class="msg-tx"></div></div>';
      document.getElementById('chat').appendChild(d);
      renderMd(d.querySelector('.msg-tx'), data.text || 'PM 汇总失败');
      scrollC();
    }).catch(function(e) {
      addSys('❌ PM 汇总失败: ' + e.message);
    });
  }
}
</script>
